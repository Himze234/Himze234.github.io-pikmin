<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pikmin Bloom 優惠代碼領取入口</title>
  
  <meta property="og:title" content="Pikmin Bloom 限定福利活動">
  <meta property="og:description" content="限定序號領取，一起種花散步！">
  <meta property="og:image" content="https://himze234.github.io/Himze234.github.io-pikmin/preview.jpg">
  <meta property="og:url" content="https://himze234.github.io/Himze234.github.io-pikmin/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: url("pikmin.jpg") center center / cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(200, 255, 200, 0.2) 0%, rgba(255, 255, 255, 0.4) 100%);
      backdrop-filter: blur(1px);
      z-index: 0;
    }
    
    .petal {
      position: absolute;
      width: 12px; height: 12px;
      background: radial-gradient(circle, #FFB7C5 0%, #FF69B4 100%);
      border-radius: 50% 0;
      opacity: 0.6;
      animation: fall linear infinite;
      z-index: 1;
    }
    @keyframes fall {
      to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }
    
    .container { 
      text-align: center; 
      max-width: 400px;
      position: relative;
      z-index: 2;
      padding: 40px 30px;
      background: rgba(255, 255, 255, 0.35);
      border-radius: 24px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 8px 32px rgba(100, 150, 100, 0.2);
    }
    
    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 16px;
    }
    
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid #fff;
      object-fit: cover;
      filter: drop-shadow(0 0 12px rgba(255, 203, 5, 0.6));
      position: relative;
      z-index: 1;
    }
    
    .avatar-wrap::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #FFCB05, #7ED957, #FFCB05);
      z-index: 0;
      animation: rotate 4s linear infinite;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }
    
    h1 { 
      font-size: 36px; 
      color: #2D5016;
      margin-bottom: 8px; 
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(255, 255, 255, 0.8);
    }
    
    p { 
      font-size: 16px; 
      color: #4A7C59; 
      font-weight: 700; 
      margin-bottom: 28px;
      letter-spacing: 1px;
    }
    
    .btn {
      background: linear-gradient(180deg, #FFDC00 0%, #FFCB05 100%);
      color: #2D5016; 
      padding: 16px 48px;
      text-decoration: none; 
      border-radius: 50px;
      font-size: 20px;
      font-weight: 900; 
      display: inline-block;
      transition: all 0.3s;
      box-shadow: 0 6px 0 #E6B800, 0 8px 20px rgba(255, 203, 5, 0.4);
      position: relative;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 6px 0 #E6B800, 0 8px 20px rgba(255, 203, 5, 0.4); }
      50% { box-shadow: 0 6px 0 #E6B800, 0 8px 30px rgba(255, 203, 5, 0.7); }
    }
    
    .btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #E6B800, 0 12px 25px rgba(255, 203, 5, 0.6);
    }
    
    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #E6B800, 0 4px 10px rgba(255, 203, 5, 0.4);
    }
    
    .badge {
      font-size: 12px;
      color: #4A7C59;
      margin-top: 16px;
      opacity: 0.8;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .container { opacity: 0; animation: fadeInUp 0.8s ease-out 0.2s forwards; }
    .avatar-wrap { opacity: 0; animation: fadeInUp 0.8s ease-out 0.4s forwards; }
    h1 { opacity: 0; animation: fadeInUp 0.8s ease-out 0.6s forwards; }
    p, .btn, .badge { opacity: 0; animation: fadeInUp 0.8s ease-out 0.8s forwards; }
    
  </style>
</head>
<body>
  <script>
    for(let i=0; i<8; i++){
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.style.left = Math.random()*100 + '%';
      petal.style.animationDuration = 5 + Math.random()*5 + 's';
      petal.style.animationDelay = Math.random()*5 + 's';
      document.body.appendChild(petal);
    }
  </script>
  
  <div class="container">
    <div class="avatar-wrap">
      <img class="avatar" src="pikminlogo.png" alt="Pikmin Bloom">
    </div>
    <h1>Pikmin Bloom</h1>
    <p>限定優惠代碼領取入口</p>
    <a class="btn" href="https://lin.ee/QljxEX3">立即領取優惠代碼</a>
    <div class="badge">© Niantic / Nintendo</div>
  </div>
</body>
</html>
